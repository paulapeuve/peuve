<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>PEUVE PORTFOLIO</title>
    <link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css">
</head>


<body>
    <header>
        <div class="header-left">Paula Pavía</div>
        <div class="header-center">PEUVE</div>
        <div class="header-right">Design Portfolio</div>
    </header>
    <div class="spacer"></div>

    <nav class="main-menu">
        <a data-categoria="diseno_grafico">Diseño Gráfico</a>
        <a data-categoria="fotografia">Fotografía</a>
        <a data-categoria="ux_ui">UX/UI</a>
        <a data-categoria="ilustracion">Ilustración</a>
        <a data-categoria="edicion_imagen">Edición de Imagen</a>
        <a data-categoria="diseno_web">Diseño Web</a>
        <a data-categoria="diseno_editorial">Diseño Editorial</a>
        <a data-categoria="3d">3D</a>
        <a data-categoria="identidad_marca">Identidad de Marca</a>
    </nav>

    <div id="intro-animation">
        <img id="animation-img" src="assets/ilustraciones/Ilustración_sin_título-6 (1).png" alt="Muñeco bajando menú">
        <div class="anima-text" id="instruction-text1">Haz click en la pantalla</div>
        <div class="anima-text2" id="instruction-text2">Ey tú!</div>
    </div>



    <div id="galeria">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <!-- Las imágenes se cargan dinámicamente con JavaScript -->
            </div>
        </div>
    </div>

    <!-- POPUP -->
    <div class="popup-overlay" id="popup-overlay">
        <div class="popup-box">
            <button class="popup-close" id="popup-close">✕</button>
            <div class="popup-img-wrap">
                <img id="popup-img" src="" alt="">
            </div>
            <div class="popup-body">
                <p class="popup-title" id="popup-titulo"></p>
                <p class="popup-desc" id="popup-descripcion"></p>
                <p class="popup-tools-label">Herramientas</p>
                <div class="popup-tools" id="popup-herramientas"></div>
            </div>
        </div>
    </div>

</body>

<div class="bot-bar">
    <div class="bot-left">
        <a href="https://www.instagram.com/jpeuveg">@jpeuveg</a>
    </div>
    <div class="bot-right">
        disfruta.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
<script src="js/main.js"></script>


</html>
